{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ заборонено | SmartFarm</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/general.css' %}">
    <link rel="stylesheet" href="{% static 'css/error_page.css' %}">
</head>
<body class="error-body">

    <div class="error-container">
        <div class="error-icon-wrapper">
            <div class="error-icon-bg"></div>
            <i class="ri-shield-keyhole-line error-icon"></i>
        </div>

        <h1 class="error-code">403</h1>
        <h2 class="error-title">Доступ заборонено</h2>

        <p class="error-message">
            Вибачте, але у вас немає прав для перегляду цієї сторінки.
        </p>

        <div class="error-actions">
            <button onclick="window.history.back()" class="btn-outline">
                <i class="ri-arrow-left-line"></i> Повернутися назад
            </button>
            <a href="{% url 'dashboard' %}" class="btn-primary"> <i class="ri-home-4-line"></i> На головну
            </a>
        </div>
    </div>

</body>
</html>
